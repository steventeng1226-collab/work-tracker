<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="工作追蹤">
<meta name="application-name" content="工作追蹤">
<meta name="theme-color" content="#ffffff">
<title>工作追蹤</title>
<script>
(function(){
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const gap = Math.round(size * 0.04);
    const half = Math.round((size - gap * 3) / 2);
    const r = Math.round(size * 0.10);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(0,0,size,size,size*0.18);
    else ctx.rect(0,0,size,size);
    ctx.fill();
    const cells=[
      {x:gap,       y:gap,       bg:'#FCEBEB',fg:'#A32D2D',t:'P1'},
      {x:gap*2+half,y:gap,       bg:'#FAEEDA',fg:'#854F0B',t:'P2'},
      {x:gap,       y:gap*2+half,bg:'#f0f0f0',fg:'#555555',t:'P3'},
      {x:gap*2+half,y:gap*2+half,bg:'#EAF3DE',fg:'#27500A',t:'P4'},
    ];
    cells.forEach(({x,y,bg,fg,t})=>{
      ctx.fillStyle=bg;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x,y,half,half,r);
      else ctx.rect(x,y,half,half);
      ctx.fill();
      ctx.fillStyle=fg;
      ctx.font=`bold ${Math.round(half*0.38)}px sans-serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(t,x+half/2,y+half/2);
    });
    return c.toDataURL('image/png');
  }
  window.addEventListener('DOMContentLoaded',function(){
    try{
      const i192=makeIcon(192);
      const i512=makeIcon(512);
      const manifest={name:'工作追蹤',short_name:'工作追蹤',start_url:'./',display:'standalone',background_color:'#ffffff',theme_color:'#ffffff',orientation:'portrait',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
      const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
      const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
      const al=document.createElement('link');al.rel='apple-touch-icon';al.href=i192;document.head.appendChild(al);
    }catch(e){console.warn('icon err',e);}
  });
})();
</script>
<style>
:root {
  --red: #E24B4A; --orange: #EF9F27; --green: #3B6D11; --blue: #185FA5;
  --red-bg: #FCEBEB; --red-dark: #A32D2D;
  --orange-bg: #FAEEDA; --orange-dark: #854F0B;
  --green-bg: #EAF3DE; --green-mid: #1D9E75;
  --blue-bg: #EBF3FA;
  --gray: #888; --gray-light: #f0f0f0;
  --text: #1a1a1a; --text-muted: #999; --text-hint: #ccc;
  --border: #eeeeee; --divider: #f2f2f2;
  --bg: #f5f5f5; --card: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', 'Heiti TC', sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 430px; margin: 0 auto; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
#root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Scroll ── */
.scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 76px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Tab Bar ── */
.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--card); border-top: 0.5px solid var(--border);
  display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 200;
}
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 0; }
.tab-item .t-label { font-size: 10px; color: #bbb; transition: color 0.15s; }
.tab-item.active .t-label { color: var(--red); font-weight: 500; }
.tab-item .t-bar { width: 18px; height: 2px; border-radius: 1px; background: transparent; transition: background 0.15s; }
.tab-item.active .t-bar { background: var(--red); }

/* ── Header row ── */
.date-bar {
  background: var(--card); padding: 15px 16px 11px;
  display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
.date-main { font-size: 22px; font-weight: 600; color: var(--text); }
.date-wd { font-size: 13px; color: var(--text-muted); margin-left: 8px; }
.date-right { font-size: 11px; color: var(--text-muted); }

/* ── Stat cards ── */
.stat-row { display: flex; gap: 6px; padding: 10px 12px 8px; background: var(--card); border-bottom: 0.5px solid var(--border); }
.stat-card { flex: 1; background: #fafafa; border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 4px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 600; }
.stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* ── Section header ── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 5px; }
.sec-hdr-left { display: flex; align-items: center; gap: 5px; }
.sec-dot { width: 7px; height: 7px; border-radius: 2px; }
.sec-title { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; }
.sec-count { font-size: 11px; color: var(--text-muted); }

/* ── Meeting row ── */
.m-row {
  background: var(--card); padding: 10px 16px;
  border-bottom: 0.5px solid var(--divider);
  display: flex; align-items: center; gap: 9px; cursor: pointer;
  transition: background 0.1s;
}
.m-row:active { background: #f8f8f8; }
.m-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background 0.2s; }
/* 未完成的會議：粗體黑色 */
.m-time { font-size: 12px; color: #555; width: 74px; flex-shrink: 0; white-space: nowrap; font-weight: 500; }
.m-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-arrow { font-size: 16px; color: var(--text-hint); flex-shrink: 0; }
/* 已完成的會議：刪除線＋淺灰色 */
.m-row.done .m-time { text-decoration: line-through; color: #ccc; font-weight: 400; }
.m-row.done .m-title { text-decoration: line-through; color: #ccc; font-weight: 400; }
.m-row.done .m-dot { background: #ddd !important; }
.m-row.done { background: #fafafa; }
.m-expand { background: #f9f9f9; padding: 10px 16px 10px 40px; border-bottom: 0.5px solid var(--divider); font-size: 13px; color: #666; line-height: 1.7; }

/* ── Task row ── */
.t-row {
  background: var(--card); padding: 10px 16px;
  border-bottom: 0.5px solid var(--divider);
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  transition: background 0.1s;
}
.t-row:active { background: #f8f8f8; }
.p-badge { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.p1-b { background: var(--red-bg); color: var(--red-dark); }
.p2-b { background: var(--orange-bg); color: var(--orange-dark); }
.p3-b { background: var(--gray-light); color: #555; }
.p4-b { background: var(--green-bg); color: #27500A; }
.t-title { font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p1-t { color: var(--red); }
.p2-t { color: var(--orange); }
.p3-t { color: var(--text); }
.p4-t { color: var(--green); }
.t-date-area { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.overdue-pill { background: var(--red-bg); color: var(--red-dark); font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
.t-date { font-size: 11px; }

/* ── Page headers (detail / form) ── */
.page-hdr {
  background: var(--card); padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.page-hdr-title { flex: 1; font-size: 17px; font-weight: 500; }
.back-btn { font-size: 26px; color: var(--text-muted); cursor: pointer; line-height: 1; padding-right: 4px; }
.hdr-action { font-size: 13px; color: var(--blue); cursor: pointer; font-weight: 500; }

/* ── Form ── */
.form-wrap { background: var(--bg); min-height: 100%; padding-bottom: 20px; }
.form-section { background: var(--card); margin-bottom: 8px; }
.form-row { padding: 12px 16px; border-bottom: 0.5px solid #f7f7f7; display: flex; align-items: center; gap: 12px; }
.form-row:last-child { border-bottom: none; }
.f-label { font-size: 13px; color: var(--text-muted); width: 82px; flex-shrink: 0; }
.form-row input, .form-row select {
  flex: 1; border: none; outline: none; font-size: 14px;
  background: transparent; color: var(--text); font-family: inherit;
  -webkit-appearance: none;
}
.form-row input::placeholder { color: var(--text-hint); }
.form-textarea-wrap { padding: 12px 16px; }
.form-textarea-wrap label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 8px; }
.form-textarea-wrap textarea {
  width: 100%; border: none; outline: none; font-size: 14px;
  background: transparent; color: var(--text); font-family: inherit;
  resize: none; min-height: 100px; line-height: 1.7;
}
.form-textarea-wrap textarea::placeholder { color: var(--text-hint); }
.created-row { padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.created-val { font-size: 14px; color: var(--text-muted); }

/* ── Buttons ── */
.btn-row { display: flex; gap: 10px; padding: 16px; }
.btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--red); color: #fff; }
.btn-close { background: var(--orange-bg); color: var(--orange-dark); }
.btn-secondary { background: var(--gray-light); color: #555; }
.btn-edit { background: var(--blue-bg); color: var(--blue); }

/* ── Detail ── */
.detail-wrap { background: var(--bg); min-height: 100%; padding-bottom: 20px; }
.detail-block { background: var(--card); margin-bottom: 8px; }
.detail-meta { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 18px; }
.detail-field { }
.df-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.df-value { font-size: 14px; color: var(--text); }
.detail-text { padding: 12px 16px; }
.dt-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.dt-value { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }

/* ── History ── */
.h-search {
  margin: 10px 14px;
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: 9px; padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.h-search input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; font-family: inherit; color: var(--text); }
.h-search input::placeholder { color: var(--text-hint); }
.h-month { padding: 8px 16px 4px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; background: var(--bg); }
.h-row { background: var(--card); padding: 10px 16px; border-bottom: 0.5px solid var(--divider); cursor: pointer; }
.h-row:active { background: #f8f8f8; }
.h-top { display: flex; align-items: center; gap: 8px; }
.h-title { font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-date { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.h-meta { font-size: 12px; color: #bbb; padding-left: 28px; margin-top: 3px; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 80px; right: 20px;
  width: 50px; height: 50px;
  background: var(--red); border-radius: 25px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 3px 10px rgba(226,75,74,0.45); z-index: 150;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ── Toast ── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(30,30,30,0.85); color: #fff;
  padding: 9px 18px; border-radius: 20px; font-size: 13px;
  z-index: 999; white-space: nowrap; pointer-events: none;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateX(-50%) translateY(-6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ── Loading / Empty ── */
.spinner { display: flex; align-items: center; justify-content: center; padding: 48px 16px; color: var(--text-muted); font-size: 14px; }
.empty { text-align: center; padding: 48px 16px; color: var(--text-hint); font-size: 14px; }

/* ── Setup screen ── */
.setup-wrap { padding: 32px 24px; display: flex; flex-direction: column; gap: 16px; }
.setup-title { font-size: 20px; font-weight: 600; }
.setup-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
.setup-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
.setup-input:focus { border-color: var(--red); }
</style>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ════════════════════════════════════════════════════
// ① CONFIG  ← 部署 Apps Script 後填入 URL
// ════════════════════════════════════════════════════
let GAS_URL = localStorage.getItem('gas_url') || '';

// ════════════════════════════════════════════════════
// ② UTILS
// ════════════════════════════════════════════════════
const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const todayDisplay = () => {
  const d = new Date();
  return `${d.getFullYear()} / ${d.getMonth()+1} / ${d.getDate()}`;
};
const todayWD = () => WEEKDAYS[new Date().getDay()];

const fmtShort = s => {
  if(!s) return '';
  const d = new Date(s + 'T00:00:00');
  if(isNaN(d)) return s;
  return `${d.getMonth()+1}/${d.getDate()}`;
};

// 將 UTC ISO 字串轉為手機本地時間 HH:MM（跟著手機時區走）
const utcToLocalTime = utcISO => {
  if (!utcISO) return '';
  try {
    const d = new Date(utcISO);
    if (isNaN(d)) return '';
    const h  = d.getHours();
    const mi = d.getMinutes();
    return (h < 10 ? '0'+h : h) + ':' + (mi < 10 ? '0'+mi : mi);
  } catch(e) { return ''; }
};

// 將 UTC ISO 字串轉為手機本地日期 YYYY-MM-DD
const utcToLocalDate = utcISO => {
  if (!utcISO) return '';
  try {
    const d = new Date(utcISO);
    if (isNaN(d)) return '';
    const y  = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  } catch(e) { return ''; }
};
const fmtFull = s => {
  if(!s) return '—';
  const d = new Date(s + 'T00:00:00');
  if(isNaN(d)) return s;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
};
const isOverdue = dueDate => {
  if(!dueDate) return false;
  const due = new Date(dueDate + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return due < now;
};
const thisWeekRange = () => {
  const now = new Date(); now.setHours(0,0,0,0);
  const week = new Date(now); week.setDate(week.getDate()+7);
  return { now, week };
};

// 標準化優先等級：Sheets 可能存 "P1 緊急" 或 "P1"，統一取 P1~P4
const normP = p => { const m = String(p||'').match(/P[1-4]/); return m ? m[0] : 'P3'; };
const PMAP = { P1:{badge:'p1-b',text:'p1-t',label:'緊急'}, P2:{badge:'p2-b',text:'p2-t',label:'重要'}, P3:{badge:'p3-b',text:'p3-t',label:'一般'}, P4:{badge:'p4-b',text:'p4-t',label:'備忘'} };
const pInfo = p => PMAP[p] || PMAP.P3;

// ════════════════════════════════════════════════════
// ③ API
// ════════════════════════════════════════════════════
// ── Apps Script CORS 說明 ──────────────────────────────────
// GAS 不支援 CORS preflight（OPTIONS），
// 所以 POST 必須用 text/plain（不觸發 preflight），
// GAS 端用 e.postData.contents 解析 JSON 字串。
// GET 請求無 preflight 問題，直接使用。
// ────────────────────────────────────────────────────────

const fetchWithTimeout = (url, options={}, ms=10000) => {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(t));
};

const api = {
  async get(action, params = {}) {
    if (!GAS_URL) throw new Error('尚未設定 Apps Script 網址');
    const qs = new URLSearchParams({ action, ...params }).toString();
    const res = await fetchWithTimeout(`${GAS_URL}?${qs}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    return data;
  },
  async post(body) {
    if (!GAS_URL) throw new Error('尚未設定 Apps Script 網址');
    // 使用 text/plain 避免 CORS preflight，GAS 端解析 JSON 字串
    const res = await fetchWithTimeout(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    return data;
  },
  getMeetings: d => api.get('getMeetings', { date: d }),
  getTasks:    () => api.get('getTasks'),
  getHistory:  () => api.get('getHistory'),
  getMembers:  () => api.get('getMembers'),
  addTask:     data => api.post({ action:'addTask', ...data }),
  updateTask:  (id, data) => api.post({ action:'updateTask', id, ...data }),
  closeTask:   (id, data) => api.post({ action:'closeTask', id, ...data }),
};

// ════════════════════════════════════════════════════
// ④ SMALL COMPONENTS
// ════════════════════════════════════════════════════
const PBadge = ({ level }) => {
  const p = normP(level);
  const BG  = {P1:'#FCEBEB', P2:'#FAEEDA', P3:'#f0f0f0', P4:'#EAF3DE'};
  const COL = {P1:'#A32D2D', P2:'#854F0B', P3:'#555555', P4:'#27500A'};
  const LBL = {P1:'緊急',    P2:'重要',    P3:'一般',    P4:'備忘'};
  return (
    <div style={{
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      width:34, minWidth:34, height:36, borderRadius:6, flexShrink:0,
      background: BG[p], border:'none',
    }}>
      <span style={{fontSize:11, fontWeight:600, lineHeight:1.2, color:COL[p]}}>{p}</span>
      <span style={{fontSize:9,  fontWeight:400, lineHeight:1.2, color:COL[p]}}>{LBL[p]}</span>
    </div>
  );
};

const PCOL = { P1:'#E24B4A', P2:'#EF9F27', P3:'#1a1a1a', P4:'#3B6D11' }; // P1=紅 P2=橘 P3=黑 P4=綠

const TaskRow = ({ task, onClick }) => {
  const p = normP(task.priority);
  const overdue = isOverdue(task.dueDate);
  // P2 逾期 → 紅色；其他依優先等級（P1紅/P2橘/P3黑/P4綠）
  const titleColor = (p === 'P2' && overdue) ? '#E24B4A' : (PCOL[p] || '#1a1a1a');
  return (
    <div className="t-row" onClick={() => onClick(task)}>
      <PBadge level={p} />
      <span style={{
        flex:1, fontSize:14, whiteSpace:'nowrap', overflow:'hidden',
        textOverflow:'ellipsis', color: titleColor, fontWeight: 400,
      }}>{task.title}</span>
      <div className="t-date-area">
        {overdue && <span className="overdue-pill">逾期</span>}
        <span style={{ fontSize:11, color: overdue ? '#E24B4A' : '#bbb' }}>
          {fmtShort(task.dueDate)}
        </span>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════
// ⑤ DASHBOARD
// ════════════════════════════════════════════════════
const Dashboard = ({ meetings, tasks, onTaskClick }) => {
  const p1cnt = tasks.filter(t => t.priority === 'P1').length;
  const p2cnt = tasks.filter(t => t.priority === 'P2').length;
  const overdueCnt = tasks.filter(t => isOverdue(t.dueDate)).length;
  const { now, week } = thisWeekRange();
  const weekCnt = tasks.filter(t => {
    if (!t.dueDate) return false;
    const d = new Date(t.dueDate + 'T00:00:00');
    return d >= now && d <= week;
  }).length;

  return (
    <div>
      <div className="date-bar">
        <div>
          <span className="date-main">{todayDisplay()}</span>
          <span className="date-wd">{todayWD()}</span>
        </div>
        <span className="date-right" style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}><span>⟳ 今日 {meetings.length} 場</span><span style={{fontSize:10,color:"#ccc"}}>v1.1</span></span>
      </div>
      <div className="stat-row">
        <div className="stat-card"><div className="stat-num" style={{color:'var(--red)'}}>{p1cnt}</div><div className="stat-lbl">P1 極急</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--orange)'}}>{p2cnt}</div><div className="stat-lbl">P2 重要</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--red)'}}>{overdueCnt}</div><div className="stat-lbl">逾期</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--gray)'}}>{weekCnt}</div><div className="stat-lbl">本週到期</div></div>
      </div>

      <div style={{background:'var(--green-bg)'}}>
        <div className="sec-hdr">
          <div className="sec-hdr-left">
            <div className="sec-dot" style={{background:'var(--green)'}}></div>
            <span className="sec-title" style={{color:'var(--green)'}}>今日會議</span>
          </div>
          <span className="sec-count">{meetings.length} 場</span>
        </div>
      </div>
      {meetings.map((m, i) => {
        const st = (m.startUTC ? utcToLocalTime(m.startUTC) : m.startTime) || m.startTime;
        const et = (m.endUTC   ? utcToLocalTime(m.endUTC)   : m.endTime)   || m.endTime;
        return (
          <div key={i} className={`m-row ${m.done ? 'done' : ''}`}>
            <div className="m-dot" style={{background: m.done ? '#ddd' : 'var(--green-mid)'}} />
            <span className="m-time">{st}{et ? '–'+et : ''}</span>
            <span className="m-title" style={m.done?{textDecoration:'line-through',color:'#ccc',fontWeight:400}:{fontWeight:600,color:'#1a1a1a'}}>{m.title}</span>
          </div>
        );
      })}
      {meetings.length === 0 && <div className="empty" style={{padding:'16px',fontSize:13,color:'#bbb'}}>今日無會議</div>}

      <div style={{background:'var(--blue-bg)',marginTop:4}}>
        <div className="sec-hdr">
          <div className="sec-hdr-left">
            <div className="sec-dot" style={{background:'var(--blue)'}}></div>
            <span className="sec-title" style={{color:'var(--blue)'}}>工作任務</span>
          </div>
          <span className="sec-count">{tasks.length} 項</span>
        </div>
      </div>
      {tasks.map((t, i) => <TaskRow key={i} task={t} onClick={onTaskClick} />)}
      {tasks.length === 0 && <div className="empty" style={{padding:'16px',fontSize:13,color:'#bbb'}}>無進行中任務</div>}
    </div>
  );
};

// ════════════════════════════════════════════════════
// ⑥ MEETINGS PAGE
// ════════════════════════════════════════════════════
const MeetingsPage = ({ meetings, setMeetings, onRefresh, loading }) => {
  const [expanded, setExpanded] = useState(null);

  const toggleDone = (idx) => {
    const updated = meetings.map((m, i) => i === idx ? { ...m, done: !m.done } : m);
    setMeetings(updated);
    const key = `meeting_done_${todayStr()}`;
    const map = JSON.parse(localStorage.getItem(key) || '{}');
    map[meetings[idx].title] = !meetings[idx].done;
    localStorage.setItem(key, JSON.stringify(map));
  };

  return (
    <div>
      <div className="date-bar">
        <div>
          <span className="date-main">{todayDisplay()}</span>
          <span className="date-wd">{todayWD()}</span>
        </div>
        <span className="date-right" onClick={onRefresh} style={{cursor:'pointer',color:'var(--blue)'}}>⟳ 重新同步</span>
      </div>
      {loading && <div className="spinner">同步中...</div>}
      {!loading && meetings.length === 0 && <div className="empty">今日無會議安排</div>}
      {meetings.map((m, i) => {
        const st = (m.startUTC ? utcToLocalTime(m.startUTC) : m.startTime) || m.startTime;
        const et = (m.endUTC   ? utcToLocalTime(m.endUTC)   : m.endTime)   || m.endTime;
        return (
          <div key={i}>
            <div className={`m-row ${m.done ? 'done' : ''}`}>
              <div
                className="m-dot"
                style={{ background: m.done ? '#ddd' : 'var(--green-mid)', cursor: 'pointer' }}
                onClick={() => toggleDone(i)}
              />
              <span className="m-time">{st}{et ? '–'+et : ''}</span>
              <span className="m-title" onClick={() => setExpanded(expanded === i ? null : i)}>
                {m.title}
              </span>
              <span className="m-arrow" onClick={() => setExpanded(expanded === i ? null : i)}>
                {expanded === i ? '∨' : '›'}
              </span>
            </div>
            {expanded === i && (
              <div className="m-expand">
                {m.location && <div>📍 {m.location}</div>}
                {!m.location && !m.description && <div style={{color:'#bbb'}}>無詳細資訊</div>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ════════════════════════════════════════════════════
// ⑦ TASK FORM PAGE (新增 / 編輯)
// ════════════════════════════════════════════════════
const TaskFormPage = ({ initial, members, onBack, onSave, mode = 'add' }) => {
  const blank = { priority:'P1', title:'', owner:'', dueDate:'', completionDate:'', progress:'', reflection:'', createdDate: todayStr() };
  const [form, setForm] = useState(initial ? { ...blank, ...initial } : blank);
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSave = async () => {
    if (!form.title.trim()) { alert('請填入追蹤事項'); return; }
    setSaving(true);
    try { await onSave(form); }
    finally { setSaving(false); }
  };

  return (
    <div className="form-wrap">
      <div className="page-hdr">
        <span className="back-btn" onClick={onBack}>‹</span>
        <span className="page-hdr-title">{mode === 'add' ? '新增任務' : '編輯任務'}</span>
        <span></span>
      </div>

      <div className="form-section">
        <div className="form-row">
          <span className="f-label">優先等級</span>
          <select value={form.priority} onChange={e => set('priority', e.target.value)}>
            <option value="P1">P1 極急</option>
            <option value="P2">P2 重要</option>
            <option value="P3">P3 一般</option>
            <option value="P4">P4 備忘</option>
          </select>
        </div>
        <div className="form-row">
          <span className="f-label">追蹤事項</span>
          <input type="text" placeholder="任務標題" value={form.title} onChange={e => set('title', e.target.value)} />
        </div>
      </div>

      <div className="form-section">
        <div className="form-row">
          <span className="f-label">負責人</span>
          <select value={form.owner} onChange={e => set('owner', e.target.value)}>
            <option value="">— 選擇 —</option>
            {members.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div className="form-row">
          <span className="f-label">預定完成日</span>
          <input type="date" value={form.dueDate} onChange={e => set('dueDate', e.target.value)} />
        </div>
        <div className="form-row">
          <span className="f-label">實際完成日</span>
          <input type="date" value={form.completionDate} onChange={e => set('completionDate', e.target.value)} />
        </div>
      </div>

      <div className="form-section">
        <div className="form-textarea-wrap">
          <label>處理過程履歷</label>
          <textarea
            placeholder="記錄處理過程（可換行輸入）..."
            value={form.progress}
            rows={5}
            onChange={e => set('progress', e.target.value)}
          />
        </div>
      </div>

      <div className="form-section">
        <div className="form-textarea-wrap">
          <label>結案心得</label>
          <textarea
            placeholder="結案後的心得與改善方向..."
            value={form.reflection}
            rows={3}
            onChange={e => set('reflection', e.target.value)}
          />
        </div>
      </div>

      <div className="form-section">
        <div className="created-row">
          <span className="f-label" style={{fontSize:13,color:'var(--text-muted)'}}>立案日期</span>
          <span className="created-val">{fmtFull(form.createdDate)}</span>
        </div>
      </div>

      <div className="btn-row">
        <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
          {saving ? '儲存中...' : '存檔'}
        </button>
        <button className="btn btn-secondary" onClick={onBack}>取消</button>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════
// ⑧ TASK DETAIL PAGE
// ════════════════════════════════════════════════════
const TaskDetailPage = ({ task, members, onBack, onSaved, onClosed }) => {
  const [editMode, setEditMode] = useState(false);
  const [closing, setClosing] = useState(false);
  const [current, setCurrent] = useState(task);
  const overdue = isOverdue(current.dueDate);

  const handleSave = async (data) => {
    await api.updateTask(current.id, data);
    setCurrent({ ...current, ...data });
    onSaved(current.id, data);
    setEditMode(false);
  };

  const handleClose = async () => {
    if (!window.confirm('確定要結案此任務嗎？')) return;
    setClosing(true);
    try {
      const closeDate = current.completionDate || todayStr();
      await api.closeTask(current.id, { ...current, completionDate: closeDate });
      onClosed(current.id, { ...current, completionDate: closeDate });
    } catch(e) {
      setClosing(false);
      const msg = e.name === 'AbortError'
        ? '⚠ 連線逾時（15秒），請確認 Apps Script 已部署且網址正確'
        : '⚠ 結案失敗：' + e.message;
      alert(msg);
    }
  };

  if (editMode) return (
    <TaskFormPage
      initial={current}
      members={members}
      onBack={() => setEditMode(false)}
      onSave={handleSave}
      mode="edit"
    />
  );

  return (
    <div className="detail-wrap">
      <div className="page-hdr">
        <span className="back-btn" onClick={onBack}>‹</span>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,overflow:'hidden'}}>
          <PBadge level={current.priority} />
          <span style={{fontSize:15,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {current.title}
          </span>
        </div>
        <span className="hdr-action" onClick={() => setEditMode(true)}>編輯</span>
      </div>

      <div className="detail-block">
        <div className="detail-meta">
          <div className="detail-field">
            <div className="df-label">優先等級</div>
            <div className={`df-value ${pInfo(current.priority).text}`}>{current.priority} {pInfo(current.priority).label}</div>
          </div>
          <div className="detail-field">
            <div className="df-label">負責人</div>
            <div className="df-value">{current.owner || '—'}</div>
          </div>
          <div className="detail-field">
            <div className="df-label">預定完成日</div>
            <div className="df-value" style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{color: overdue ? 'var(--red)' : 'inherit'}}>{fmtFull(current.dueDate)}</span>
              {overdue && <span className="overdue-pill">逾期</span>}
            </div>
          </div>
          {current.completionDate && (
            <div className="detail-field">
              <div className="df-label">實際完成日</div>
              <div className="df-value">{fmtFull(current.completionDate)}</div>
            </div>
          )}
          <div className="detail-field">
            <div className="df-label">立案日期</div>
            <div className="df-value">{fmtFull(current.createdDate)}</div>
          </div>
        </div>
      </div>

      {current.progress ? (
        <div className="detail-block">
          <div className="detail-text">
            <div className="dt-label">處理過程履歷</div>
            <div className="dt-value">{current.progress}</div>
          </div>
        </div>
      ) : null}

      {current.reflection ? (
        <div className="detail-block">
          <div className="detail-text">
            <div className="dt-label">結案心得</div>
            <div className="dt-value">{current.reflection}</div>
          </div>
        </div>
      ) : null}

      <div className="btn-row">
        <button className="btn btn-close" onClick={handleClose} disabled={closing}>
          {closing ? '結案中...' : '✓ 結案'}
        </button>
        <button className="btn btn-edit" onClick={() => setEditMode(true)}>編輯</button>
        <button className="btn btn-secondary" onClick={onBack}>返回</button>
      </div>
    </div>
  );
};

// ⑩ HISTORY PAGE
// ════════════════════════════════════════════════════
const HistoryPage = ({ history, onItemClick }) => {
  const [query, setQuery] = useState('');

  const filtered = history.filter(t => {
    if (!query) return true;
    const q = query.toLowerCase();
    return (t.title || '').toLowerCase().includes(q) || (t.owner || '').toLowerCase().includes(q);
  });

  const grouped = {};
  filtered.forEach(t => {
    const d = t.completionDate ? new Date(t.completionDate + 'T00:00:00') : null;
    const key = d && !isNaN(d) ? `${d.getFullYear()} 年 ${d.getMonth()+1} 月` : '未知';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });

  return (
    <div>
      <div className="h-search">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#bbb" strokeWidth="1.5"/>
          <line x1="10.5" y1="10.5" x2="15" y2="15" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
        <input placeholder="搜尋關鍵字 / 負責人..." value={query} onChange={e => setQuery(e.target.value)} />
        {query && <span onClick={() => setQuery('')} style={{cursor:'pointer',color:'#bbb',fontSize:20,lineHeight:1}}>×</span>}
      </div>
      {filtered.length === 0 && <div className="empty">查無結果</div>}
      {Object.entries(grouped).map(([month, items]) => (
        <div key={month}>
          <div className="h-month">{month}</div>
          {items.map((t, i) => (
            <div key={i} className="h-row" onClick={() => onItemClick(t)}>
              <div className="h-top">
                <PBadge level={t.priority} />
                <span className="h-title">{t.title}</span>
                <span className="h-date">{fmtShort(t.completionDate)}</span>
              </div>
              <div className="h-meta">負責人：{t.owner || '—'}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
};

const App = () => {
  const [gasUrl, setGasUrl] = useState(GAS_URL);
  const [tab, setTab] = useState('dashboard');
  const [meetings, setMeetings] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [history, setHistory] = useState([]);
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [meetLoading, setMeetLoading] = useState(false);
  const [view, setView] = useState('list'); // 'list' | 'add' | 'detail' | 'historyDetail'
  const [selectedTask, setSelectedTask] = useState(null);
  const [toast, setToast] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const saveGasUrl = url => {
    localStorage.setItem('gas_url', url);
    GAS_URL = url;
    setGasUrl(url);
  };

  useEffect(() => { if (gasUrl) loadAll(); }, [gasUrl]);

  const loadAll = async () => {
    setLoading(true);
    try {
      const [t, h, mb] = await Promise.all([api.getTasks(), api.getHistory(), api.getMembers()]);
      const sorted = (t.tasks || []).sort((a, b) => new Date(a.dueDate || '9999') - new Date(b.dueDate || '9999'));
      setTasks(sorted);
      setHistory(h.history || []);
      setMembers(mb.members || []);
    } catch (e) { showToast('⚠ 資料載入失敗'); }
    setLoading(false);
    loadMeetings();
  };

  const loadMeetings = async () => {
    setMeetLoading(true);
    try {
      const res = await api.getMeetings(todayStr());
      const doneMap = JSON.parse(localStorage.getItem(`meeting_done_${todayStr()}`) || '{}');
      const ms = (res.meetings || []).map(m => ({ ...m, done: !!doneMap[m.title] }));
      setMeetings(ms);
    } catch (e) { console.warn('Meeting load failed', e); }
    setMeetLoading(false);
  };

  const handleAddTask = async data => {
    const newTask = { ...data, id: `T${Date.now()}` };
    await api.addTask(newTask);
    setTasks(prev => [...prev, newTask].sort((a,b) => new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999')));
    setView('list');
    showToast('✓ 任務已新增');
  };

  const handleSavedTask = (id, data) => {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...data } : t));
    showToast('✓ 已更新');
  };

  const handleClosedTask = (id, data) => {
    setTasks(prev => prev.filter(t => t.id !== id));
    setHistory(prev => [{ ...data }, ...prev]);
    setView('list');
    showToast('✓ 任務已結案');
  };

  // ── Render overlay views ──
  if (!gasUrl) return <SetupScreen onSave={saveGasUrl} />;

  if (view === 'add') return (
    <TaskFormPage members={members} onBack={() => setView('list')} onSave={handleAddTask} mode="add" />
  );
  if (view === 'detail' && selectedTask) return (
    <TaskDetailPage
      task={selectedTask} members={members}
      onBack={() => setView('list')}
      onSaved={handleSavedTask}
      onClosed={handleClosedTask}
    />
  );
  if (view === 'historyDetail' && selectedTask) return (
    <TaskDetailPage
      task={selectedTask} members={members}
      onBack={() => setView('list')}
      onSaved={() => {}}
      onClosed={() => {}}
    />
  );

  const renderContent = () => {
    if (loading) return <div className="spinner">載入中...</div>;
    switch (tab) {
      case 'dashboard': return <Dashboard meetings={meetings} tasks={tasks} onTaskClick={t => { setSelectedTask(t); setView('detail'); }} />;
      case 'meetings': return <MeetingsPage meetings={meetings} setMeetings={setMeetings} onRefresh={loadMeetings} loading={meetLoading} />;
      case 'tasks': return <TasksPage tasks={tasks} onTaskClick={t => { setSelectedTask(t); setView('detail'); }} />;
      case 'history': return <HistoryPage history={history} onItemClick={t => { setSelectedTask(t); setView('historyDetail'); }} />;
    }
  };

  return (
    <>
      <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div className="scroll-area">{renderContent()}</div>

        {tab === 'tasks' && (
          <div className="fab" onClick={() => setView('add')}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
              <path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/>
            </svg>
          </div>
        )}

        <div className="tab-bar">
          {[
            { key:'dashboard', label:'戰情中心' },
            { key:'meetings',  label:'今日會議' },
            { key:'tasks',     label:'Tasks' },
            { key:'history',   label:'歷史紀錄' },
          ].map(({ key, label }) => (
            <div key={key} className={`tab-item ${tab === key ? 'active' : ''}`} onClick={() => setTab(key)}>
              {TAB_ICONS[key]}
              <span className="t-label">{label}</span>
              <div className="t-bar" />
            </div>
          ))}
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
